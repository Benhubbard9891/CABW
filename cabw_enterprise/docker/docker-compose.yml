version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cabw-postgres
    environment:
      POSTGRES_USER: cabw
      POSTGRES_PASSWORD: cabw
      POSTGRES_DB: cabw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cabw"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cabw-network

  # Redis Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: cabw-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cabw-network

  # RabbitMQ (for Celery)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cabw-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cabw
      RABBITMQ_DEFAULT_PASS: cabw
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cabw-network

  # CABW API Server
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: cabw-api
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DB_URL: postgresql+asyncpg://cabw:cabw@postgres:5432/cabw
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://cabw:cabw@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ../src:/app/src:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cabw-network
    command: >
      uvicorn cabw.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug

  # Celery Worker
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: cabw-worker
    environment:
      ENVIRONMENT: development
      DB_URL: postgresql+asyncpg://cabw:cabw@postgres:5432/cabw
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://cabw:cabw@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ../src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cabw-network
    command: >
      celery -A cabw.worker worker
      --loglevel=info
      --concurrency=4
      --prefetch-multiplier=1

  # Celery Beat (Scheduler)
  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: cabw-beat
    environment:
      ENVIRONMENT: development
      DB_URL: postgresql+asyncpg://cabw:cabw@postgres:5432/cabw
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://cabw:cabw@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ../src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cabw-network
    command: >
      celery -A cabw.worker beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: cabw-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - cabw-network

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: cabw-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - cabw-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  cabw-network:
    driver: bridge
